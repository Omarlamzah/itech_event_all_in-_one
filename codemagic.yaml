# Codemagic CI/CD configuration for the Badign 2026 Flutter app.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# Code signing uses MANUAL creation of the distribution certificate + provisioning
# profile from a private key (CERTIFICATE_PRIVATE_KEY) — the same proven setup used
# for the les_theme app. This avoids the "No matching profiles found" error.
#
# One-time setup required in the Codemagic UI:
#   1. App Store Connect integration named exactly: codemagic
#   2. A SECURE environment variable named CERTIFICATE_PRIVATE_KEY, in group
#      "appstore_credentials", whose value is the full contents of:
#      .../my files/cert_key.pem  (BEGIN/END lines included).
#   3. (For TestFlight upload) an app record in App Store Connect with bundle id
#      com.itech.badignapp, and its numeric Apple ID placed in APP_STORE_APPLE_ID.

workflows:
  ios-appstore:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      # Must match the App Store Connect API key name in the Codemagic UI exactly.
      app_store_connect: codemagic

    environment:
      groups:
        # Provides the secure CERTIFICATE_PRIVATE_KEY variable (set in Codemagic UI).
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.itech.badignapp"
        # Numeric "Apple ID" of the app in App Store Connect
        # (App Store Connect > your app > App Information > General > Apple ID).
        APP_STORE_APPLE_ID: 6780184486
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          # Creates/fetches the iOS Distribution certificate from the provided
          # private key, and creates the App Store provisioning profile + App ID.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa (auto-increment build number)
        script: |
          # Look up the latest build number; fall back to 0 if the app record
          # does not exist in App Store Connect yet (first build / APP_STORE_APPLE_ID still 0).
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          if [ -z "$LATEST" ]; then LATEST=0; fi
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$((LATEST + 1))

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight automatically after a successful build.
        submit_to_testflight: true
        submit_to_app_store: false
